document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.stageRef = React.createRef();\n    this.fitRef = React.createRef();\n  }\n  state = { screen:'home', showNotes:true, journeyPhase:'travel', journeyTheme:'Comfort', competitor:'italo' };\n\n  componentDidMount(){\n    this._fit = () => {\n      const s = Math.min(window.innerWidth/1520, (window.innerHeight-32)/1000);\n      const sc = Math.min(s, 1);\n      if(this.stageRef.current) this.stageRef.current.style.transform = `scale(${sc})`;\n      if(this.fitRef.current){ this.fitRef.current.style.width = (1520*sc)+'px'; this.fitRef.current.style.height = (1000*sc)+'px'; }\n    };\n    this._fit();\n    window.addEventListener('resize', this._fit);\n    window.boardGoTo = (s) => this.setState({ screen:s, showNotes:true });\n  }\n  componentWillUnmount(){ window.removeEventListener('resize', this._fit); }\n\n  nav(s){ this.setState({ screen:s }); }\n\n  themeMeta(){\n    return [\n      {key:'tariffe', label:'Tariffe & Ricavi', color:'#00665B', count:42},\n      {key:'flotta', label:'Flotta & Asset', color:'#1B9AAA', count:31},\n      {key:'esg', label:'ESG & Sostenibilità', color:'#9A94BC', count:28},\n      {key:'loyalty', label:'Loyalty', color:'#F9B122', count:19},\n      {key:'disruption', label:'Disruption mgmt', color:'#F75C03', count:14},\n      {key:'cx', label:'Customer experience', color:'#B91372', count:23},\n    ];\n  }\n\n  notesFor(screen){\n    const A='#F75C03', M='#3C3C3B';\n    const mk = (n,type,px,py,lx,ly,cx,cy,text) => {\n      const color = type==='auto'?A:M;\n      return { n, color, dash: type==='auto'?'4 3':'none', px,py,lx,ly,\n        tag: type==='auto'?'AUTOMATICO':'MANUALE', text,\n        cardStyle: { position:'absolute', left:cx+'px', top:cy+'px', width:'196px', background:'#fff', border:'1px solid '+color, borderLeft:'4px solid '+color, borderRadius:'6px', padding:'9px 11px', boxShadow:'0 6px 16px -8px rgba(40,40,40,.4)', pointerEvents:'auto' } };\n    };\n    if(screen==='home') return [\n      mk(1,'auto', 545,300, 208,182, 12,150, \"L'hero e tutte le viste si popolano dai PPT caricati: il sistema estrae testo, grafici, dati e metadati (competitor, tematica, data) da ogni file.\"),\n      mk(3,'manual', 380,545, 208,500, 12,468, \"L'utente avvia da qui la ricerca: l'agente «Benchmark Navigator» apre il filtro per tematica.\"),\n      mk(2,'auto', 1135,548, 1306,470, 1306,440, \"Stato cartella sorgente: conteggio documenti e «ultimo caricamento» si aggiornano da soli a ogni nuovo file.\"),\n      mk(4,'auto', 1150,720, 1306,700, 1306,668, \"Gli estratti dei benchmark sono classificati in automatico per fase della Traveler Journey e per tematica di contenuto.\"),\n    ];\n    if(screen==='search') return [\n      mk(1,'manual', 360,360, 208,300, 12,270, \"L'utente seleziona una tematica e affina per competitor e periodo.\"),\n      mk(2,'auto', 700,330, 1306,300, 1306,270, \"I risultati aggregano in automatico gli estratti da più PPT: ogni card cita file e slide d'origine.\"),\n      mk(3,'auto', 760,560, 1306,540, 1306,510, \"Tag tematici e metadati sono assegnati automaticamente durante l'indicizzazione.\"),\n      mk(4,'manual', 1148,206, 1306,182, 1306,152, \"Da qui l'utente genera gli output a partire dai risultati correnti.\"),\n    ];\n    if(screen==='output') return [\n      mk(1,'manual', 700,300, 208,250, 12,218, \"Dalla stessa schermata l'utente sceglie quale output generare.\"),\n      mk(2,'auto', 470,540, 208,500, 12,470, \"Sintesi testuale generata automaticamente dagli estratti selezionati.\"),\n      mk(3,'auto', 1010,520, 1306,330, 1306,300, \"Cherry picking automatico: il sistema compone un pacchetto con le slide più pertinenti già nel database.\"),\n      mk(4,'auto', 1080,640, 1306,640, 1306,608, \"Ogni slide mantiene il riferimento alla presentazione di origine.\"),\n    ];\n    if(screen==='profile') return [\n      mk(1,'manual', 470,250, 208,210, 12,180, \"L'utente seleziona il competitor: SNCF, Italo o ITA Airways.\"),\n      mk(2,'auto', 1130,290, 1306,200, 1306,170, \"Profilo auto-aggiornato: ogni dato è estratto dai PPT caricati e si aggiorna a ogni nuovo file.\"),\n      mk(3,'auto', 470,520, 208,470, 12,440, \"Feed news: ultime notizie pubblicate, estratte dai documenti.\"),\n      mk(4,'auto', 1055,420, 1306,340, 1306,310, \"Grafico di bilancio popolato dai dati numerici estratti dai PPT.\"),\n      mk(5,'auto', 1055,650, 1306,640, 1306,610, \"Indicatore età media flotta, ricalcolato automaticamente.\"),\n    ];\n    return [];\n  }\n\n  renderVals(){\n    const sc = this.state.screen;\n    const RED='#C4262E';\n    const navStyle = (k) => ({\n      height:'100%', display:'flex', alignItems:'center', padding:'0 15px',\n      fontSize:'14px', fontWeight:600, cursor:'pointer',\n      color: sc===k?'#242424':'#605E5C',\n      borderBottom: sc===k?'3px solid '+RED:'3px solid transparent',\n      marginBottom:'-1px'\n    });\n    const journeyData = [\n      {key:'awareness', short:'Awareness & Conversion', color:'#E58AA0', themes:['Comunicazione','Branding','Pricing','Servizi VAS','Offerta integrata','Assistenza','Treno/Prodotto','Capillarità','Loyalty','Touchpoint','Modalità di pagamento','User Experience','Upselling/Cross-selling']},\n      {key:'pre', short:'Pre-viaggio', color:'#DD6E86', themes:['Notifiche personalizzate','Assistenza','Accessibilità','Servizi VAS seamless']},\n      {key:'travel', short:'Viaggio', color:'#DC4762', themes:['Comunicazione','Comfort','Servizi a bordo Treno','Feedback/segnalazione Cliente','Assistenza']},\n      {key:'post', short:'Post-viaggio', color:'#A8163A', themes:['Notifiche personalizzate','Assistenza','Servizi VAS seamless','Feedback/segnalazione Cliente']},\n      {key:'loyalty', short:'Fidelizzazione & Advocacy', color:'#6E0C24', themes:['Engagement','Customer monitoring','Offerte mirate','Benefici/vantaggi','Esclusività','Travel more – spend mor
